name: Deploy to Cloud Run

# ── Triggers ────────────────────────────────────────────────────────────────
# Push to main (path-filtered) or manual dispatch for a full redeploy.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'Dockerfile.vllm'
      - 'nginx.conf'
      - 'entrypoint.sh'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# ── Deployment Configuration ─────────────────────────────────────────────────
# Edit these variables to match your project. Everything else is derived.
env:
  # ── GCP ──────────────────────────────────────────────────────────────────
  PROJECT_ID:         ${{ secrets.GCP_PROJECT_ID }}
  REGION:             us-east4          # GCP region with L4 GPU quota
  GAR_LOCATION:       us-east4          # Artifact Registry location (same region)
  REPOSITORY:         aieng-template-cloudrun-vllm        # Artifact Registry Docker repository name

  # ── Service names ─────────────────────────────────────────────────────────
  DEMO_SERVICE:       aieng-template-cloudrun-vllm-demo   # Cloud Run CPU service (UI + proxy)
  VLLM_SERVICE:       aieng-template-cloudrun-vllm-vllm   # Cloud Run GPU service (vLLM inference)

  # ── Model ─────────────────────────────────────────────────────────────────
  MODEL_ID:           Qwen/Qwen2.5-3B-Instruct           # HuggingFace model ID
  MODEL_SERVED_NAME:  qwen2.5-3b-instruct              # Name exposed by the vLLM /v1/models API
  MODEL_CACHE_BUCKET: aieng-template-cloudrun-vllm       # GCS bucket for HF weights

  # ── vLLM inference settings ───────────────────────────────────────────────
  MAX_MODEL_LEN:      8192   # context window (tokens)
  MAX_NUM_SEQS:       32     # max concurrent sequences (L4 sweet spot for 3B)
  DTYPE:              bfloat16

  # ── Demo app settings ─────────────────────────────────────────────────────
  MAX_INPUT_CHARS:    2000   # input length guard (set to match your use case)

  # ── Misc ──────────────────────────────────────────────────────────────────
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Required GitHub Secrets ──────────────────────────────────────────────────
# GCP_PROJECT_ID       — your GCP project ID
# WIF_PROVIDER         — Workload Identity Federation provider resource name
# GCP_SERVICE_ACCOUNT  — service account email used for deployments
# HF_TOKEN             — HuggingFace token (required for gated models, optional otherwise)
# See README.md → "GitHub Secrets" for setup instructions.

jobs:

  # ── Detect which components changed ─────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      demo: ${{ steps.decide.outputs.demo }}
      vllm: ${{ steps.decide.outputs.vllm }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            demo:
              - 'app/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'entrypoint.sh'
              - 'pyproject.toml'
            vllm:
              - 'Dockerfile.vllm'

      # workflow_dispatch always rebuilds everything.
      - name: Resolve what to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "demo=true" >> $GITHUB_OUTPUT
            echo "vllm=true"  >> $GITHUB_OUTPUT
          else
            echo "demo=${{ steps.filter.outputs.demo }}" >> $GITHUB_OUTPUT
            echo "vllm=${{ steps.filter.outputs.vllm }}"  >> $GITHUB_OUTPUT
          fi

  # ── Build and push the demo app image ───────────────────────────────────────
  build-demo:
    name: Build Demo Image
    needs: [changes]
    if: needs.changes.outputs.demo == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.GAR_LOCATION }} --project=${{ env.PROJECT_ID }} \
            --format="get(name)" 2>/dev/null \
          || gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for ${{ env.REPOSITORY }}" \
            --quiet

      - name: Build and push demo image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:latest
          cache-from: type=gha,scope=demo
          cache-to: type=gha,mode=max,scope=demo

  # ── Seed model weights into GCS cache ───────────────────────────────────────
  #
  # Downloads model weights from HuggingFace to the runner's local disk (/tmp)
  # and uploads directly to GCS via gcloud storage cp — bypassing GCSFuse so
  # large safetensor files upload via GCS multipart API instead of FUSE writes.
  # Skipped if the model snapshot is already present in the bucket.
  # Must complete before deploy-vllm so cold starts load from GCS, not HF.
  seed-model-cache:
    name: Seed Model Cache (GCS)
    needs: [changes]
    if: needs.changes.outputs.vllm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Ensure model cache bucket exists
        run: |
          gcloud storage buckets describe gs://${{ env.MODEL_CACHE_BUCKET }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null \
          || gcloud storage buckets create gs://${{ env.MODEL_CACHE_BUCKET }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet
          echo "✓ Bucket gs://${{ env.MODEL_CACHE_BUCKET }} is ready"

      - name: Check if model is already cached
        id: check-cache
        run: |
          MODEL_KEY="hub/models--$(echo '${{ env.MODEL_ID }}' | tr '/' '--')"
          if gcloud storage ls "gs://${{ env.MODEL_CACHE_BUCKET }}/$MODEL_KEY/snapshots/" 2>/dev/null | grep -q .; then
            echo "cached=true" >> $GITHUB_OUTPUT
            echo "✓ Model already cached in GCS, skipping download"
          else
            echo "cached=false" >> $GITHUB_OUTPUT
            echo "Model not cached — will download and seed"
          fi

      - name: Free up disk space
        if: steps.check-cache.outputs.cached == 'false'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Download model to /tmp and upload to GCS
        if: steps.check-cache.outputs.cached == 'false'
        run: |
          pip install -q huggingface_hub

          # Download model weights to local disk (avoids GCSFuse write bottleneck)
          echo "Downloading ${{ env.MODEL_ID }} to /tmp/hf-home..."
          HF_HUB_DISABLE_XET=1 python3 - <<'EOF'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(
              "${{ env.MODEL_ID }}",
              cache_dir="/tmp/hf-home/hub",
              token=os.environ.get("HF_TOKEN") or None,
          )
          EOF

          # Upload HF cache structure directly to GCS via multipart API (fast)
          echo "Uploading to gs://${{ env.MODEL_CACHE_BUCKET }}/hub/ ..."
          gcloud storage cp -r /tmp/hf-home/hub \
            gs://${{ env.MODEL_CACHE_BUCKET }}/
          echo "✓ Model seeded to gs://${{ env.MODEL_CACHE_BUCKET }}"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # ── Build and push the vLLM server image ────────────────────────────────────
  build-vllm:
    name: Build vLLM Image
    needs: [changes]
    if: needs.changes.outputs.vllm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.GAR_LOCATION }} --project=${{ env.PROJECT_ID }} \
            --format="get(name)" 2>/dev/null \
          || gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker images for ${{ env.REPOSITORY }}" \
            --quiet

      - name: Build and push vLLM image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.vllm
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:latest
          cache-from: type=gha,scope=vllm
          cache-to: type=gha,mode=max,scope=vllm

  # ── Deploy vLLM to Cloud Run GPU ─────────────────────────────────────────────
  #
  # NVIDIA L4 GPU, min-instances=0 (scale to zero when idle).
  # Model weights are streamed from a GCS bucket via Cloud Storage FUSE,
  # so cold starts load from GCS (~1-3 min) instead of re-downloading
  # from HuggingFace on every start.
  deploy-vllm:
    name: Deploy vLLM (Cloud Run GPU)
    needs: [build-vllm, seed-model-cache]
    if: needs.build-vllm.result == 'success' && needs.seed-model-cache.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy vLLM to Cloud Run GPU
        id: deploy
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.VLLM_SERVICE }}:${{ github.sha }}"

          gcloud run deploy ${{ env.VLLM_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --gpu=1 \
            --gpu-type=nvidia-l4 \
            --memory=32Gi \
            --cpu=8 \
            --concurrency=4 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=3600 \
            --execution-environment=gen2 \
            --no-cpu-throttling \
            --no-gpu-zonal-redundancy \
            --allow-unauthenticated \
            --add-volume=name=hf-cache,type=cloud-storage,bucket=${{ env.MODEL_CACHE_BUCKET }} \
            --add-volume-mount=volume=hf-cache,mount-path=/hf-cache \
            --startup-probe=httpGet.path=/health,initialDelaySeconds=30,failureThreshold=120,periodSeconds=15,timeoutSeconds=5 \
            --set-env-vars="HF_HOME=/hf-cache,VLLM_CACHE_ROOT=/hf-cache/vllm_cache,TOKENIZERS_PARALLELISM=false,HF_TOKEN=${{ secrets.HF_TOKEN }},HF_HUB_DISABLE_XET=1" \
            --quiet

          URL=$(gcloud run services describe ${{ env.VLLM_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✓ vLLM deployed at $URL"

  # ── Deploy demo app to Cloud Run CPU ────────────────────────────────────────
  #
  # Lightweight FastAPI app + nginx. nginx serves the UI immediately on cold
  # start while uvicorn loads in the background (~20-30s). Scales to zero.
  deploy-demo:
    name: Deploy Demo (Cloud Run CPU)
    needs: [build-demo, deploy-vllm]
    if: |
      always() &&
      needs.build-demo.result == 'success' &&
      (needs.deploy-vllm.result == 'success' || needs.deploy-vllm.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Get vLLM service URL
        id: vllm-url
        run: |
          URL=$(gcloud run services describe ${{ env.VLLM_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            if [ "${{ needs.deploy-vllm.result }}" = "skipped" ]; then
              echo "::warning::vLLM service '${{ env.VLLM_SERVICE }}' not found and vLLM deployment was skipped (no Dockerfile.vllm changes)."
              echo "::warning::For the initial deployment, run this workflow via workflow_dispatch to deploy both services."
              echo "ready=false" >> $GITHUB_OUTPUT
            else
              echo "::error::vLLM service '${{ env.VLLM_SERVICE }}' not found after deployment."
              exit 1
            fi
          else
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✓ vLLM URL: $URL"
          fi

      - name: Deploy demo to Cloud Run
        id: deploy
        if: steps.vllm-url.outputs.ready == 'true'
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DEMO_SERVICE }}:${{ github.sha }}"

          gcloud run deploy ${{ env.DEMO_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=900 \
            --no-cpu-throttling \
            --allow-unauthenticated \
            --set-env-vars="VLLM_BASE_URL=${{ steps.vllm-url.outputs.url }}/v1,VLLM_MODEL_NAME=${{ env.MODEL_SERVED_NAME }},MAX_INPUT_CHARS=${{ env.MAX_INPUT_CHARS }},TOKENIZERS_PARALLELISM=false" \
            --quiet

          URL=$(gcloud run services describe ${{ env.DEMO_SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✓ Demo deployed at $URL"

      - name: Health check
        if: steps.vllm-url.outputs.ready == 'true'
        run: |
          URL="${{ steps.deploy.outputs.url }}/health"
          echo "Checking $URL..."
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null)
            if [ "$HTTP" = "200" ]; then
              echo "✓ Health check passed"
              curl -s "$URL" | python3 -m json.tool || true
              exit 0
            fi
            echo "  Attempt $i/20 — HTTP $HTTP, retrying..."
            sleep 5
          done
          echo "✗ Demo health check failed after 100s"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Deployment Summary

          **Commit:** `${{ github.sha }}`
          **Branch:** `${{ github.ref_name }}`
          **Triggered by:** @${{ github.actor }}

          ### Services
          | Service | URL | Notes |
          |---------|-----|-------|
          | **Demo UI** | ${{ steps.deploy.outputs.url }} | Cloud Run CPU, scales to zero |
          | **vLLM API** | ${{ steps.vllm-url.outputs.url }}/v1 | Cloud Run GPU (L4), scales to zero, GCS model cache |
          | **Health** | ${{ steps.deploy.outputs.url }}/health | |
          | **Model** | ${{ env.MODEL_ID }} | served via vLLM as `${{ env.MODEL_SERVED_NAME }}` |

          ---
          *Deployed at $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF
