worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx_access.log;

    # Temp dirs writable by non-root appuser
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    server {
        listen 8080;

        # Serve the UI directly from the filesystem — available immediately
        # on cold start before uvicorn has finished loading.
        location = / {
            root /app/app/demo/templates;
            try_files /index.html =404;
        }

        # Serve static assets (CSS, JS, images) directly.
        location /static/ {
            alias /app/app/demo/static/;
        }

        # Proxy all API requests to uvicorn.
        # Returns 502 while uvicorn is still loading; the frontend handles
        # this gracefully with auto-retry logic (see app/demo/static/script.js).
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout    300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            # Required for SSE streams
            proxy_buffering off;
            proxy_cache     off;
        }
    }
}
